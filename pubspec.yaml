name: testcloudapp
description: A modern Flutter application.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.1
  dio: ^5.3.0
  equatable: ^2.0.5
  http: ^1.1.0
  intl: ^0.19.0
