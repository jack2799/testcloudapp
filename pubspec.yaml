name: testcloudapp
description: A modern Flutter application.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=2.18.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.1
  dio: ^5.3.0
  equatable: ^2.0.5
  http: ^0.15.0
  intl: ^0.17.0
  provider: ^6.0.0
  cached_network_image: ^3.2.3
  shared_preferences: ^2.2.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.3.3
  json_serializable: ^6.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/