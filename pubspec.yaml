publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.5
  dio: ^5.9.2
  equatable: ^2.0.5
  http: ^1.6.0
  intl: ^0.20.2
